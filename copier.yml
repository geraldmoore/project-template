_envops:
  autoescape: false
  keep_trailing_newline: true
_subdirectory: project
_templates_suffix: .jinja
_preserve_symlinks: true
_jinja_extensions:
  - copier_template_extensions.TemplateExtensionLoader
  - extensions.py:GitExtension
  - extensions.py:SlugifyExtension
  - extensions.py:YamlListExtension

project_name:
  type: str
  help: What is your project name?

project_description:
  type: str
  help: What is your project description?

module_name:
  type: str
  help: What is your Python module name?
  default: "{{ project_name | to_slugify }}"

author_fullname:
  type: str
  help: What is your full name?

author_email:
  type: str
  help: What is your email?
  default: "{{ '' | git_user_email }}"

author_username:
  type: str
  help: What is your GitHub username?
  default: "{{ '' | git_user_name }}"

python_version:
  type: str
  help: What is your minimum Python version?
  choices: ["3.8", "3.9", "3.10", "3.11", "3.12", "3.13"]
  default: "3.12"

python_ci_versions:
  type: str
  help: Which Python versions to test in CI? (comma-separated, e.g. '3.12, 3.13')
  default: "{{ python_version }}"

setup_settings:
  type: bool
  help: Do you want to set up settings with pydantic?
  default: yes

setup_logging:
  type: bool
  help: Do you want to set up logging?
  default: yes

is_ml_project:
  type: bool
  help: Is this a machine learning project?
  default: no

experiment_tracker:
  type: str
  help: Which experiment tracking tool to use? (only applicable for ML projects)
  choices: ["none", "wandb", "mlflow"]
  default: "none"
  when: "{{ is_ml_project }}"

ml_framework:
  type: str
  help: Which ML framework to use?
  choices: ["pytorch", "tensorflow", "agnostic"]
  default: "pytorch"
  when: "{{ is_ml_project }}"

add_autoresearch_setup:
  type: bool
  help: Add autoresearch setup for an agent to configure project?
  default: no
  when: "{{ is_ml_project }}"

autoresearch_metric:
  type: str
  help: What is the primary metric to track for autoresearch? (e.g., accuracy, f1, val_loss)
  default: "accuracy"
  when: "{{ add_autoresearch_setup }}"

license:
  type: str
  help: What license do you want to use?
  choices: ["MIT", "Apache-2.0", "GPL-3.0"]
  default: MIT

_tasks:
  - git init

project/tests/conftest.py.jinja
project/.python-version.jinja
project/src/{{ module_name }}/{{ module_name }}.py.jinja
project/src/{{ module_name }}/__init__.py.jinja
project/tests/test_{{ module_name }}.py.jinja
project/.env.jinja
project/src/{{ module_name }}/{% if setup_settings or setup_logging %}core{% endif %}/config/__init__.py.jinja
project/src/{{ module_name }}/{% if setup_settings or setup_logging %}core{% endif %}/config/{% if setup_logging %}logging.py{% endif %}.jinja
project/src/{{ module_name }}/{% if setup_settings or setup_logging %}core{% endif %}/config/{% if setup_settings %}settings.py{% endif %}.jinja
project/.gitignore.jinja
project/README.md.jinja
project/justfile.jinja
project/pyproject.toml.jinja
{%- if is_ml_project %}
project/scripts/train.py.jinja
project/scripts/evaluate.py.jinja
project/scripts/predict.py.jinja
project/configs/default_config.yaml.jinja
project/src/{{ module_name }}/configs/__init__.py.jinja
project/src/{{ module_name }}/configs/experiment.py.jinja
project/src/{{ module_name }}/configs/model.py.jinja
project/src/{{ module_name }}/configs/training.py.jinja
project/src/{{ module_name }}/tracking/__init__.py.jinja
project/src/{{ module_name }}/tracking/base.py.jinja
{%- if experiment_tracker == "wandb" %}
project/src/{{ module_name }}/tracking/wandb_tracker.py.jinja
{%- elif experiment_tracker == "mlflow" %}
project/src/{{ module_name }}/tracking/mlflow_tracker.py.jinja
{%- endif %}
{%- endif %}
